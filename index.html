<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Precifica3D</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #161a22; --surface2: #1e2330; --border: #2a2f3d;
    --accent: #f97316; --accent-dim: #3b1f0a; --green: #22c55e; --yellow: #f59e0b;
    --red: #ef4444; --text: #e2e8f0; --muted: #64748b; --radius: 8px;
    --mono: 'JetBrains Mono', monospace;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  /* LOGIN */
  #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 380px; }
  .login-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .login-card p { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
  .login-field { margin-bottom: 14px; }
  .login-field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
  .login-field input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s; }
  .login-field input:focus { border-color: var(--accent); }
  .login-field input::placeholder { color: var(--muted); }
  .login-error { color: #fca5a5; font-size: 12px; margin-bottom: 12px; min-height: 18px; }
  .btn-login { width: 100%; background: var(--accent); color: white; border: none; border-radius: var(--radius); padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
  .btn-login:hover { opacity: 0.85; }

  /* HEADER */
  #admin-screen { display: none; }
  .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .header-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; }
  .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 6px; display: grid; place-items: center; font-size: 16px; }
  .badge-admin { background: var(--accent-dim); color: var(--accent); font-size: 10px; font-weight: 700; letter-spacing: 1px; padding: 2px 8px; border-radius: 100px; text-transform: uppercase; }
  .btn-logout { background: transparent; border: 1px solid var(--border); border-radius: var(--radius); color: var(--muted); padding: 7px 14px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* LAYOUT */
  .layout { max-width: 1280px; margin: 0 auto; padding: 28px 24px; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 700; font-family: var(--mono); color: var(--text); line-height: 1; }
  .stat-value.accent { color: var(--accent); }
  .stat-value.green { color: var(--green); }

  /* TOOLBAR */
  .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .search-box { flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 14px; color: var(--text); font-size: 13px; outline: none; transition: border-color 0.15s; }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }
  .filter-btn { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 14px; color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .btn-refresh { background: var(--accent); color: white; border: none; border-radius: var(--radius); padding: 9px 16px; font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn-refresh:hover { opacity: 0.85; }

  /* TABLE */
  .section-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--surface2); padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 12px 14px; font-size: 13px; vertical-align: middle; }
  .email-cell { font-weight: 500; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 100px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-Mobile { background: #1e3a6e; color: #60a5fa; }
  .badge-Desktop { background: #1a2e1a; color: #4ade80; }
  .badge-Tablet { background: #3b2314; color: #fb923c; }
  .badge-browser { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .count-pill { background: var(--accent-dim); color: var(--accent); font-family: var(--mono); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 100px; }
  .ts { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .avatar { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; font-size: 11px; font-weight: 700; flex-shrink: 0; text-transform: uppercase; }
  .user-cell { display: flex; align-items: center; gap: 10px; }
  .chevron { display: inline-block; transition: transform 0.2s; color: var(--muted); font-size: 11px; }
  tr.expanded .chevron { transform: rotate(90deg); }

  /* HISTORY */
  .history-row { display: none; }
  .history-row.visible { display: table-row; }
  .history-cell { background: #0a0c10; padding: 0 !important; border-bottom: 2px solid var(--accent-dim) !important; }
  .history-inner { padding: 16px 20px; }
  .history-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 12px; }
  .history-list { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }
  .history-entry { display: grid; grid-template-columns: 160px 100px 140px 1fr; gap: 10px; align-items: center; padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; }
  .h-timestamp { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .h-ip { font-family: var(--mono); font-size: 11px; color: var(--text); }

  /* EMPTY */
  .state-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .state-empty .icon { font-size: 32px; margin-bottom: 12px; }

  @media (max-width: 768px) {
    .layout { padding: 16px 12px; }
    .header { padding: 12px 16px; }
    .hide-mobile { display: none !important; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .history-entry { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div style="font-size:28px;margin-bottom:12px">🏷️</div>
    <h2>Precifica3D Admin</h2>
    <p>Acesso restrito ao administrador</p>
    <div class="login-field">
      <label>Senha de acesso</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" autofocus>
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="btn-login" onclick="doAdminLogin()">Entrar</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <header class="header">
    <div class="header-logo">
      <div class="logo-icon">🏷️</div>
      <span>Precifica3D</span>
      <span class="badge-admin">Admin</span>
    </div>
    <button class="btn-logout" onclick="doLogout()">Sair</button>
  </header>

  <div class="layout">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total usuários</div><div class="stat-value accent" id="stat-total">–</div></div>
      <div class="stat-card"><div class="stat-label">Logins hoje</div><div class="stat-value green" id="stat-today">–</div></div>
      <div class="stat-card"><div class="stat-label">Mobile</div><div class="stat-value" id="stat-mobile">–</div></div>
      <div class="stat-card"><div class="stat-label">Desktop</div><div class="stat-value" id="stat-desktop">–</div></div>
      <div class="stat-card"><div class="stat-label">Total logins</div><div class="stat-value" id="stat-logins">–</div></div>
    </div>

    <div class="toolbar">
      <input type="text" class="search-box" id="search-input" placeholder="Buscar por email ou IP..." oninput="applyFilters()">
      <button class="filter-btn active" onclick="setFilter('all', this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('Mobile', this)">📱 Mobile</button>
      <button class="filter-btn" onclick="setFilter('Desktop', this)">🖥️ Desktop</button>
      <button class="filter-btn" onclick="setFilter('Tablet', this)">📲 Tablet</button>
      <button class="btn-refresh" onclick="loadData()">↺ Atualizar</button>
    </div>

    <div class="section-title">Usuários registrados</div>
    <div class="table-wrap">
      <table id="users-table">
        <thead>
          <tr>
            <th style="width:28px"></th>
            <th>Usuário</th>
            <th>Último login</th>
            <th>Dispositivo</th>
            <th class="hide-mobile">Navegador</th>
            <th class="hide-mobile">Sistema</th>
            <th class="hide-mobile">IP</th>
            <th>Logins</th>
            <th style="width:24px"></th>
          </tr>
        </thead>
        <tbody id="users-body">
          <tr><td colspan="9"><div class="state-empty"><div class="icon">⏳</div><p>Carregando dados…</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ══════════════════════════════════════════════
// CONFIGURAÇÃO — substitua pelos seus valores
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyB_TmUQN_JQwYh-QQzdmehMhqe1Apnqwv8",
  authDomain:        "calculadora3d-5d2db.firebaseapp.com",
  projectId:         "calculadora3d-5d2db",
  storageBucket:     "calculadora3d-5d2db.firebasestorage.app",
  messagingSenderId: "40753148792",
  appId:             "1:40753148792:web:8b900e70fbdbcb3eea8e8d"
};

const ADMIN_PASSWORD = "Jfk135790@";

// ── Init ──────────────────────────────────────
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── Login ─────────────────────────────────────
function doAdminLogin() {
  const pwd = document.getElementById("login-password").value;
  const err = document.getElementById("login-error");
  if (pwd === ADMIN_PASSWORD) {
    sessionStorage.setItem("admin_auth", "1");
    showAdmin();
  } else {
    err.textContent = "Senha incorreta.";
  }
}

function doLogout() {
  sessionStorage.removeItem("admin_auth");
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("admin-screen").style.display = "none";
  document.getElementById("login-password").value = "";
}

document.getElementById("login-password").addEventListener("keydown", e => {
  if (e.key === "Enter") doAdminLogin();
});

function showAdmin() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("admin-screen").style.display = "block";
  loadData();
}

if (sessionStorage.getItem("admin_auth") === "1") showAdmin();

// ── Estado ────────────────────────────────────
let allUsers = [];
let activeFilter = "all";

// ── Carregar dados ────────────────────────────
async function loadData() {
  const tbody = document.getElementById("users-body");
  tbody.innerHTML = `<tr><td colspan="9"><div class="state-empty"><div class="icon">⏳</div><p>Carregando…</p></div></td></tr>`;
  try {
    const snap = await db.collection("dispositivos").get();
    const clientesSnap = await db.collection("clientes").get();
    const clientesMap = {};
    clientesSnap.forEach(doc => { clientesMap[doc.id] = doc.data(); });

    allUsers = snap.docs.map(doc => {
      const data = doc.data();
      const lista = data.lista || [];
      const ultimo = lista[lista.length - 1] || {};
      const clienteId = doc.id;
      const cliente = clientesMap[clienteId] || {};
      return {
        uid: doc.id,
        email: cliente.email || doc.id,
        totalLogins: cliente.totalLogins || lista.length,
        ultimoLogin: cliente.ultimoLogin || null,
        dispositivos: lista,
        ultimoDispositivo: ultimo.dispositivo || "–",
        ultimoNavegador: ultimo.navegador || "–",
        ultimoAcesso: ultimo.primeiro_acesso || "–",
      };
    });

    updateStats();
    applyFilters();
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="state-empty"><div class="icon">⚠️</div><p>Erro: ${err.message}</p></div></td></tr>`;
  }
}

// ── Stats ─────────────────────────────────────
function updateStats() {
  const today = new Date().toLocaleDateString("pt-BR");
  let todayCount = 0, mobileCount = 0, desktopCount = 0, totalLogins = 0;
  allUsers.forEach(u => {
    totalLogins += u.totalLogins || 0;
    if (u.ultimoDispositivo === "Android" || u.ultimoDispositivo === "iPhone" || u.ultimoDispositivo === "iPad") mobileCount++;
    else desktopCount++;
    if (u.ultimoAcesso && u.ultimoAcesso.startsWith(today)) todayCount++;
  });
  document.getElementById("stat-total").textContent   = allUsers.length;
  document.getElementById("stat-today").textContent   = todayCount;
  document.getElementById("stat-mobile").textContent  = mobileCount;
  document.getElementById("stat-desktop").textContent = desktopCount;
  document.getElementById("stat-logins").textContent  = totalLogins;
}

// ── Filtros ───────────────────────────────────
function setFilter(val, btn) {
  activeFilter = val;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById("search-input").value.toLowerCase();
  const filtered = allUsers.filter(u => {
    const matchSearch = !q || (u.email || "").toLowerCase().includes(q);
    const isMobile = ["Android", "iPhone", "iPad", "Tablet Android"].includes(u.ultimoDispositivo);
    const matchDevice = activeFilter === "all" ||
      (activeFilter === "Mobile" && isMobile) ||
      (activeFilter === "Desktop" && !isMobile) ||
      (activeFilter === "Tablet" && u.ultimoDispositivo === "iPad");
    return matchSearch && matchDevice;
  });
  renderTable(filtered);
}

// ── Tabela ────────────────────────────────────
function renderTable(users) {
  const tbody = document.getElementById("users-body");
  if (!users.length) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="state-empty"><div class="icon">🔍</div><p>Nenhum usuário encontrado.</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = users.map((u, i) => {
    const color = strColor(u.email);
    const initial = (u.email || "?")[0].toUpperCase();
    const deviceBadge = `<span class="badge badge-${isMobileDevice(u.ultimoDispositivo) ? 'Mobile' : 'Desktop'}">${isMobileDevice(u.ultimoDispositivo) ? '📱' : '🖥️'} ${u.ultimoDispositivo}</span>`;
    return `
      <tr onclick="toggleHistory('${u.uid}', ${i})" data-row="${i}">
        <td><span class="chevron">▶</span></td>
        <td><div class="user-cell"><div class="avatar" style="background:${color}20;color:${color}">${initial}</div><span class="email-cell" title="${u.email}">${u.email}</span></div></td>
        <td><span class="ts">${u.ultimoAcesso || "–"}</span></td>
        <td>${deviceBadge}</td>
        <td class="hide-mobile"><span class="badge badge-browser">${u.ultimoNavegador}</span></td>
        <td class="hide-mobile"><span style="color:var(--muted);font-size:11px">–</span></td>
        <td class="hide-mobile"><code style="font-size:11px;font-family:var(--mono);color:var(--muted)">–</code></td>
        <td><span class="count-pill">${u.totalLogins}</span></td>
        <td></td>
      </tr>
      <tr class="history-row" id="history-${u.uid}">
        <td class="history-cell" colspan="9">
          <div class="history-inner">
            <div class="history-title">Dispositivos registrados · ${u.dispositivos.length}</div>
            <div class="history-list">
              ${u.dispositivos.map(d => `
                <div class="history-entry">
                  <span class="h-timestamp">${d.primeiro_acesso || "–"}</span>
                  <span class="badge badge-${isMobileDevice(d.dispositivo) ? 'Mobile' : 'Desktop'}">${d.dispositivo || "–"}</span>
                  <span class="badge badge-browser" style="font-size:11px">${d.navegador || "–"}</span>
                  <code class="h-ip" style="font-size:11px;font-family:var(--mono);color:var(--muted)">${d.id || "–"}</code>
                </div>
              `).join("")}
            </div>
          </div>
        </td>
      </tr>`;
  }).join("");
}

function toggleHistory(uid, idx) {
  const row = document.getElementById(`history-${uid}`);
  const main = document.querySelector(`[data-row="${idx}"]`);
  const visible = row.classList.contains("visible");
  row.classList.toggle("visible", !visible);
  main.classList.toggle("expanded", !visible);
}

function isMobileDevice(d) {
  return ["Android", "iPhone", "iPad", "Tablet Android"].includes(d);
}

function strColor(str = "") {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  return `hsl(${Math.abs(hash) % 360}, 65%, 60%)`;
}
</script>
</body>
</html>
